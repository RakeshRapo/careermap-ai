<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Plan — CareerMap AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <div class="navbar-logo">C</div>
      <span class="navbar-title">CareerMap AI</span>
    </a>
    <div class="navbar-nav">
      <a href="dashboard.html">Dashboard</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero hero-sub" style="background: linear-gradient(135deg, #0F172A 0%, #064e3b 100%);">
    <div class="hero-badge" style="border-color:rgba(16,185,129,0.4); color:#6ee7b7; background:rgba(16,185,129,0.1);">💻 DSA Agent</div>
    <h1>Your DSA Plan</h1>
    <p>Structured coding preparation tailored to your pace and goals</p>
  </section>

  <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>

  <div class="container" style="padding-top:0;">
    <div class="card" style="max-width:760px; margin:0 auto;">

      <!-- Info strip -->
      <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px;">
        <div style="background:var(--mint-light); border-radius:var(--radius-md); padding:12px 18px; flex:1; min-width:140px;">
          <p style="font-size:11px; font-weight:600; color:var(--mint); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:2px;">Duration</p>
          <p style="font-size:1.3rem; font-weight:700; color:var(--text-primary);">30 Days</p>
        </div>
        <div style="background:var(--indigo-light); border-radius:var(--radius-md); padding:12px 18px; flex:1; min-width:140px;">
          <p style="font-size:11px; font-weight:600; color:var(--indigo); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:2px;">Level</p>
          <p style="font-size:1.3rem; font-weight:700; color:var(--text-primary);">Personalized</p>
        </div>
        <div style="background:var(--amber-light); border-radius:var(--radius-md); padding:12px 18px; flex:1; min-width:140px;">
          <p style="font-size:11px; font-weight:600; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:2px;">Status</p>
          <p style="font-size:1.3rem; font-weight:700; color:var(--text-primary);">Active</p>
        </div>
      </div>

      <p class="section-heading">📋 Your Personalized Roadmap</p>

      <div id="loadingDsa" class="loading-state">
        <div class="spinner" style="border-top-color:var(--mint);"></div>
        <span>Loading your DSA plan…</span>
      </div>
      <pre id="dsa" style="display:none; border-left-color:var(--mint);"></pre>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
